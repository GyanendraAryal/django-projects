{% extends "todo/base.html" %}
{% block content %}
<h2>Delete Task</h2>
<p>Are you sure want to delete the task {{task.title}} </p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, delete</button>
    <a href="{%url 'todo:task_list'%}" class="btnbtn-secondary">Cancel</a>
</form>
{% endblock content %}
